<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Kahvila animaatio</title>

<style>
body {
    background-color: #94672c3d;
    text-align: center;
    font-family: Arial;
}

/* Kahvilapöytä */
.table {
    width: 200px;
    height: 20px;
    background: rgb(0, 0, 3);
    margin: 10px auto;
}

/* Mies */
.man {
    width: 200px;
}

/* Kahvikuppi */
.cup {
    width: 50px;
    position: relative;
    animation: juo 2s infinite;
}

/* Juomis-animaatio */
@keyframes juo {
    0% { top: 0px; }
    50% { top: -20px; }
    100% { top: 0px; }
}
</style>

</head>
<body>

<h1>Kahvilassa mies☕</h1>

<!-- Mies -->
<img src="mies.png" class="man" alt="mies kahvilassa">

<div class="table"></div>

<!-- Kahvikuppi -->
<img src="https://cdn-icons-png.flaticon.com/512/1047/1047462.png" class="cup">

</body>
</html>
