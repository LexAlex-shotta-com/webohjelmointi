<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>xAI FC 26 - Selainversio</title>
<style>
    body { margin: 0; background: #111; overflow: hidden; }
    canvas { display: block; margin: auto; background: #006400; }
</style>
</head>
<body>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 1000;
const HEIGHT = 600;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// --- Pelaaja ---
class Player {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.color = color;
        this.stamina = 100;
    }
}

// --- Pallo ---
class Ball {
    constructor() {
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.vx = 0;
        this.vy = 0;
    }
}

let player = new Player(200, HEIGHT/2, "blue");
let enemies = [
    new Player(700, 150, "red"),
    new Player(700, 300, "red"),
    new Player(700, 450, "red")
];

let ball = new Ball();

let scorePlayer = 0;
let scoreAI = 0;
let timeLeft = 180;
let rain = false;

// --- Game loop ---
function update(dt) {
    timeLeft -= dt;

    let ax = 0, ay = 0;

    if (keys["w"] || keys["ArrowUp"]) ay -= 1;
    if (keys["s"] || keys["ArrowDown"]) ay += 1;
    if (keys["a"] || keys["ArrowLeft"]) ax -= 1;
    if (keys["d"] || keys["ArrowRight"]) ax += 1;

    let len = Math.hypot(ax, ay);
    if (len > 0) {
        ax /= len;
        ay /= len;
        let accel = player.stamina > 30 ? 1200 : 800;
        player.vx += ax * accel * dt;
        player.vy += ay * accel * dt;
    }

    player.vx *= 0.88;
    player.vy *= 0.88;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    player.x = Math.max(50, Math.min(WIDTH-50, player.x));
    player.y = Math.max(50, Math.min(HEIGHT-50, player.y));

    // Ball physics
    ball.vx *= 0.975;
    ball.vy *= 0.975;
    if (rain) {
        ball.vx *= 0.92;
        ball.vy *= 0.92;
    }

    ball.x += ball.vx * dt * 60;
    ball.y += ball.vy * dt * 60;

    // Player hits ball
    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let dist = Math.hypot(dx, dy);

    if (dist < 28) {
        if (keys["Shift"]) {
            let angle = Math.atan2(dy, dx);
            ball.vx = Math.cos(angle) * 18;
            ball.vy = Math.sin(angle) * 18;
            player.stamina -= 8;
        } else {
            ball.x = player.x + (dx/dist) * 22;
            ball.y = player.y + (dy/dist) * 22;
        }
    }

    // AI
    enemies.forEach(e => {
        let dx = ball.x - e.x;
        let dy = ball.y - e.y;
        let d = Math.hypot(dx, dy);
        if (d > 0) {
            e.x += (dx/d) * 200 * dt;
            e.y += (dy/d) * 200 * dt;
        }

        if (d < 30 && Math.random() < 0.02) {
            ball.vx += (player.x - e.x) * -0.1;
            ball.vy += (player.y - e.y) * -0.1;
        }
    });

    // Goals
    if (ball.x < 40 && ball.y > 220 && ball.y < 380) {
        scoreAI++;
        reset();
    }

    if (ball.x > WIDTH-40 && ball.y > 220 && ball.y < 380) {
        scorePlayer++;
        reset();
    }

    if (Math.random() < 0.001) rain = !rain;

    player.stamina = Math.min(100, player.stamina + 15 * dt);
}

function reset() {
    player.x = 200;
    player.y = HEIGHT/2;
    ball.x = WIDTH/2;
    ball.y = HEIGHT/2;
    ball.vx = 0;
    ball.vy = 0;
}

// --- Draw ---
function draw() {
    ctx.fillStyle = "#228B22";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // Midline
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(WIDTH/2, 0);
    ctx.lineTo(WIDTH/2, HEIGHT);
    ctx.stroke();

    // Goals
    ctx.strokeRect(20, 220, 40, 160);
    ctx.strokeRect(WIDTH-60, 220, 40, 160);

    // Player
    drawCircle(player.x, player.y, 15, "blue");

    // Enemies
    enemies.forEach(e => drawCircle(e.x, e.y, 15, "red"));

    // Ball
    drawCircle(ball.x, ball.y, 10, "white");

    // UI
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(`${scorePlayer} - ${scoreAI}`, WIDTH/2 - 40, 50);

    ctx.font = "20px Arial";
    ctx.fillText(Math.floor(timeLeft) + "s", WIDTH/2 - 20, 80);

    if (rain) {
        ctx.fillStyle = "#ccc";
        ctx.fillText("🌧️ SATEINEN KENTTÄ", 20, 30);
    }
}

function drawCircle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
}

// --- Loop ---
let last = 0;
function loop(t) {
    let dt = (t - last) / 1000;
    last = t;

    update(dt);
    draw();

    if (timeLeft > 0) {
        requestAnimationFrame(loop);
    } else {
        alert(scorePlayer > scoreAI ? "VOITIT 🎉" : "HÄVISIT 💀");
    }
}

requestAnimationFrame(loop);
</script>

</body>
</html>
