<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 1000;
const HEIGHT = 600;

// Kamera
let camera = {
    x: 0,
    y: 0,
    zoom: 1.2
};

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Pelaaja
class Player {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.color = color;
        this.angle = 0;
        this.anim = 0;
        this.stamina = 100;
    }
}

// Pallo
class Ball {
    constructor() {
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.vx = 0;
        this.vy = 0;
        this.spin = 0;
    }
}

let player = new Player(200, HEIGHT/2, "blue");
let enemies = [
    new Player(700, 150, "red"),
    new Player(700, 300, "red"),
    new Player(700, 450, "red")
];

let ball = new Ball();

let scorePlayer = 0;
let scoreAI = 0;
let timeLeft = 180;
let rain = false;

// --- UPDATE ---
function update(dt) {
    timeLeft -= dt;

    let ax = 0, ay = 0;

    if (keys["w"] || keys["ArrowUp"]) ay -= 1;
    if (keys["s"] || keys["ArrowDown"]) ay += 1;
    if (keys["a"] || keys["ArrowLeft"]) ax -= 1;
    if (keys["d"] || keys["ArrowRight"]) ax += 1;

    let len = Math.hypot(ax, ay);
    if (len > 0) {
        ax /= len;
        ay /= len;

        let accel = player.stamina > 30 ? 1200 : 800;
        player.vx += ax * accel * dt;
        player.vy += ay * accel * dt;

        player.angle = Math.atan2(player.vy, player.vx);
        player.anim += 10 * dt; // juoksuanimaatio
    }

    player.vx *= 0.88;
    player.vy *= 0.88;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Kamera seuraa pehmeästi
    let targetX = player.x - WIDTH / 2;
    let targetY = player.y - HEIGHT / 2;

    camera.x += (targetX - camera.x) * 0.08;
    camera.y += (targetY - camera.y) * 0.08;

    // Ball physics
    ball.vx *= 0.975;
    ball.vy *= 0.975;

    ball.x += ball.vx * dt * 60;
    ball.y += ball.vy * dt * 60;

    // Spin efekti
    ball.spin += (ball.vx + ball.vy) * 0.05;

    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let dist = Math.hypot(dx, dy);

    if (dist < 28) {
        if (keys["Shift"]) {
            let angle = Math.atan2(dy, dx);
            ball.vx = Math.cos(angle) * 18;
            ball.vy = Math.sin(angle) * 18;
            ball.spin = 10;
        } else {
            ball.x = player.x + (dx/dist) * 22;
            ball.y = player.y + (dy/dist) * 22;
        }
    }

    // AI
    enemies.forEach(e => {
        let dx = ball.x - e.x;
        let dy = ball.y - e.y;
        let d = Math.hypot(dx, dy);

        if (d > 0) {
            e.x += (dx/d) * 200 * dt;
            e.y += (dy/d) * 200 * dt;
            e.angle = Math.atan2(dy, dx);
        }
    });

    // Maalit
    if (ball.x < 40 && ball.y > 220 && ball.y < 380) {
        scoreAI++; reset();
    }
    if (ball.x > WIDTH-40 && ball.y > 220 && ball.y < 380) {
        scorePlayer++; reset();
    }
}

function reset() {
    player.x = 200;
    player.y = HEIGHT/2;
    ball.x = WIDTH/2;
    ball.y = HEIGHT/2;
    ball.vx = 0;
    ball.vy = 0;
}

// --- DRAW ---
function draw() {
    ctx.save();

    // Kamera transform
    ctx.scale(camera.zoom, camera.zoom);
    ctx.translate(-camera.x, -camera.y);

    // Kenttä
    ctx.fillStyle = "#228B22";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(WIDTH/2, 0);
    ctx.lineTo(WIDTH/2, HEIGHT);
    ctx.stroke();

    // Pelaaja animaatio
    drawPlayer(player);

    enemies.forEach(drawPlayer);

    drawBall(ball);

    ctx.restore();

    // UI (ei zoomia)
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(`${scorePlayer} - ${scoreAI}`, WIDTH/2 - 40, 50);

    ctx.font = "20px Arial";
    ctx.fillText(Math.floor(timeLeft) + "s", WIDTH/2 - 20, 80);
}

function drawPlayer(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    // body
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI*2);
    ctx.fill();

    // jalat animaatio
    let legMove = Math.sin(p.anim) * 10;

    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-10, 10 + legMove);
    ctx.moveTo(0, 0);
    ctx.lineTo(10, 10 - legMove);
    ctx.stroke();

    ctx.restore();
}

function drawBall(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.spin);

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI*2);
    ctx.fill();

    // spin visuaali
    ctx.strokeStyle = "gold";
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI);
    ctx.stroke();

    ctx.restore();
}

// LOOP
let last = 0;
function loop(t) {
    let dt = (t - last) / 1000;
    last = t;

    update(dt);
    draw();

    if (timeLeft > 0) {
        requestAnimationFrame(loop);
    } else {
        alert(scorePlayer > scoreAI ? "VOITIT 🎉" : "HÄVISIT 💀");
    }
}

requestAnimationFrame(loop);
</script>
